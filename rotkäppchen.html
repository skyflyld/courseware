<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Rotkäppchen · 小红帽 · 德语童话</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:Georgia,'Times New Roman',serif;background:#1a1a2e;user-select:none;-webkit-user-select:none}
#book{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;perspective:1200px}

.page-wrap{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .5s ease,opacity .5s ease;pointer-events:none}
.page-wrap.active{pointer-events:auto;z-index:10}
.page-wrap.exit-left{transform:translateX(-30%) rotateY(-8deg) scale(.92);opacity:0;z-index:5}
.page-wrap.enter-right{transform:translateX(30%) rotateY(8deg) scale(.92);opacity:0;z-index:5}
.page-wrap.exit-right{transform:translateX(30%) rotateY(8deg) scale(.92);opacity:0;z-index:5}
.page-wrap.enter-left{transform:translateX(-30%) rotateY(-8deg) scale(.92);opacity:0;z-index:5}

.page{position:relative;width:92vmin;height:calc(92vmin*1.35);border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;background:#1a1a2e}
@media(min-aspect-ratio:4/3){.page{height:88vh;width:calc(88vh/1.35)}}
@media(max-width:600px){.page{width:96vw;height:calc(96vw*1.5);border-radius:0}}

/* Cover page */
.cover-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6%}
.page-cover{background:linear-gradient(135deg,#6a1b1a,#b71c1c 50%,#880e4f);color:#fff}
.cover-emoji{font-size:clamp(48px,12vmin,100px);margin-bottom:2vmin}
.cover-title{font-size:clamp(28px,7vmin,56px);font-weight:700;letter-spacing:4px;text-shadow:0 2px 8px rgba(0,0,0,.3);margin-bottom:1.5vmin}
.cover-sub{font-size:clamp(12px,2.5vmin,20px);opacity:.8;letter-spacing:2px}
.cover-by{font-size:clamp(10px,2vmin,16px);opacity:.5;margin-top:3vmin}
.cover-tip{position:absolute;bottom:10%;font-size:clamp(11px,2vmin,14px);opacity:.6;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:.2}}

/* Story pages: image on top, text scrolls below */
.page-img{flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(0,0,0,.12);min-height:0;padding:4% 4% 0 4%}
.page-img img{display:block;width:100%;height:auto;object-fit:contain;border-radius:8px;max-height:42vh;-webkit-user-drag:none}
@media(min-width:800px){.page-img img{max-height:45vh}}
@media(max-width:400px){.page-img img{max-height:38vh}}

.page-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:3% 5% 5%;min-height:0}
.page-body::-webkit-scrollbar{width:3px}
.page-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px}

.story-text{font-size:clamp(14px,3vmin,22px);line-height:1.8}
@media(max-width:400px){.story-text{font-size:clamp(13px,3.5vw,17px);line-height:1.6}}
.story-text p{margin-bottom:.5em}
.story-text .sent{transition:color .3s,opacity .3s;cursor:pointer}
.story-text .sent.inactive{opacity:.35}
.story-text .sent.active{opacity:1;font-weight:700}
.story-text .sent.done{opacity:1}

.page-number{position:absolute;bottom:8px;right:12px;font-size:11px;opacity:.4;letter-spacing:1px;z-index:5}

.theme-forest{background:linear-gradient(160deg,#1a3a1a,#2d5a27 30%,#3a7a35 60%,#1a3a1a);color:#e8f5e9}
.theme-dark{background:linear-gradient(160deg,#1a1a2e,#2d1b2e 40%,#1a1a2e);color:#d5c6e0}
.theme-warm{background:linear-gradient(160deg,#5d4037,#795548 30%,#8d6e63 60%,#5d4037);color:#fff3e0}
.theme-light{background:linear-gradient(160deg,#fff8e1,#fffde7 40%,#fff8e1);color:#4e342e}
.theme-happy{background:linear-gradient(160deg,#fce4ec,#fff3e0 40%,#e8f5e9);color:#3e2723}

.end-emoji{font-size:clamp(36px,8vmin,60px);margin-bottom:1vmin;text-align:center}

/* Controls */
#speak-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:10px 14px;background:linear-gradient(rgba(0,0,0,.65),transparent);gap:8px}
.speak-btn{min-width:44px;height:40px;border:none;border-radius:20px;background:rgba(255,255,255,.13);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 14px;gap:5px;backdrop-filter:blur(3px);transition:all .2s;font-family:sans-serif}
.speak-btn:active{transform:scale(.93)}
.speak-btn.speaking{background:#c0392b;box-shadow:0 0 16px rgba(192,57,43,.5)}
.speak-btn svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}
.speak-label{font-size:12px;font-weight:600;letter-spacing:.5px}
@media(max-width:360px){.speak-label{display:none}}

#auto-wrap{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.5);font-size:10px;font-family:sans-serif}
#auto-wrap input{display:none}
.toggle-track{width:30px;height:16px;background:rgba(255,255,255,.18);border-radius:8px;position:relative;flex-shrink:0;transition:background .2s}
.toggle-track::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .2s}
#auto-wrap input:checked+.toggle-track{background:#c0392b}
#auto-wrap input:checked+.toggle-track::after{transform:translateX(14px)}

#speed-wrap{display:flex;align-items:center;gap:3px;color:rgba(255,255,255,.45);font-size:10px;font-family:sans-serif}
#speed-btn{background:rgba(255,255,255,.08);border:none;color:#fff;padding:2px 7px;border-radius:3px;cursor:pointer;font-size:10px;font-family:sans-serif}
#speed-btn:active{background:rgba(255,255,255,.2)}

#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:8px 14px;background:linear-gradient(transparent,rgba(0,0,0,.65));gap:12px}
.nav-btn{width:40px;height:40px;border:2px solid rgba(255,255,255,.25);border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:active{transform:scale(.88);background:rgba(255,255,255,.2)}
.nav-btn:disabled{opacity:.25;pointer-events:none}
#prgTxt{color:rgba(255,255,255,.75);font-size:13px;white-space:nowrap;letter-spacing:1px;font-family:sans-serif;min-width:55px;text-align:center}

#tap-left,#tap-right{position:fixed;top:0;bottom:72px;width:35%;z-index:50;cursor:pointer;-webkit-tap-highlight-color:transparent}
#tap-left{left:0}#tap-right{right:0}

#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;z-index:999;font-family:sans-serif;font-size:15px;opacity:1;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.12);border-top-color:#c0392b;border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style></head>

var P=[{"cover": true, "theme": "theme-cover", "title": "Rotkäppchen", "subtitle": "Ein Märchen der Brüder Grimm", "emoji": "👧🏻", "tip": "🫱 tippen zum Blättern"}, {"theme": "theme-light", "img": "cover", "text": ["Es war einmal ein kleines Mädchen. Es trug immer eine rote Kappe. Darum nannten alle es Rotkäppchen.", "Rotkäppchen wohnte mit seiner Mutter am Waldrand. Es war ein fröhliches und hilfsbereites Kind. Alle Menschen im Dorf mochten es gern."]}, {"theme": "theme-forest", "text": ["Eines Tages sagte die Mutter: Rotkäppchen bring der kranken Großmutter Kuchen und Wein. Sie wohnt im Wald gleich hinter den drei alten Eichen.", "Geh aber nicht vom Weg ab! sagte die Mutter. Rotkäppchen nahm den Korb und machte sich auf den Weg."]}, {"theme": "theme-forest", "img": "meeting", "text": ["Im Wald war es wunderschön. Die Vögel zwitscherten die Sonne schien durch die Bäume. Rotkäppchen pflückte Blumen für die Großmutter.", "Da tauchte plötzlich der Wolf auf. Er war groß und hatte scharfe Zähne. Aber er sprach freundlich."]}, {"theme": "theme-dark", "text": ["Der Wolf fragte: Wohin gehst du Rotkäppchen?", "Ich gehe zur Großmutter antwortete Rotkäppchen. Sie ist krank und ich bringe ihr Kuchen und Wein.", "Der Wolf dachte: Ha! Ich fresse beide! Immer lächelte er freundlich."]}, {"theme": "theme-dark", "img": "wolf_running", "text": ["Der Wolf sagte: Sieh doch die schönen Blumen! Deine Großmutter freut sich bestimmt über einen großen Strauß.", "Rotkäppchen lief tiefer in den Wald um mehr Blumen zu pflücken.", "Der Wolf aber rannte schnell zum Haus der Großmutter. Er klopfte an die Tür. Herein! rief die Großmutter."]}, {"theme": "theme-warm", "img": "wolf_bed", "text": ["Der Wolf stürzte sich auf die Großmutter und fraß sie auf. Aber er war noch nicht satt. Er zog das Nachthemd der Großmutter an setzte ihre Haube auf und legte sich ins Bett.", "Dann wartete er auf Rotkäppchen. Die Bettdecke zog er sich bis zur Nase."]}, {"theme": "theme-warm", "text": ["Bald kam Rotkäppchen ans Haus. Es klopfte an die Tür. Herein! rief der Wolf mit seiner tiefen Stimme.", "Rotkäppchen trat ein. Großmutter warum hast du so große Ohren? Damit ich dich besser hören kann!", "Und warum hast du so große Augen? Damit ich dich besser sehen kann!"]}, {"theme": "theme-dark", "img": "dialogue", "text": ["Großmutter warum hast du so große Hände? Damit ich dich besser packen kann!", "Und warum hast du so einen großen Mund? Damit ich dich besser fressen kann!", "Mit diesen Worten sprang der Wolf aus dem Bett und fraß auch Rotkäppchen auf. Dann schlief er ein und schnarchte laut."]}, {"theme": "theme-forest", "img": "hunter", "text": ["Ein Jäger hörte das laute Schnarchen. Das klang ja seltsam! Er trat ins Haus und sah den Wolf im Bett der Großmutter liegen.", "Schnell holte er eine Schere und schnitt dem Wolf den Bauch auf. Heraus kamen Rotkäppchen und die Großmutter. Beide waren noch am Leben!"]}, {"theme": "theme-happy", "text": ["Der Jäger nähte dicke Steine in den Bauch des Wolfes. Als der Wolf aufwachte konnte er kaum laufen und rannte ängstlich davon.", "Rotkäppchen die Großmutter und der Jäger aßen gemeinsam Kuchen und tranken Wein. Sie waren sehr glücklich."]}, {"theme": "theme-light", "img": "hunter", "end": true, "text": ["Rotkäppchen hatte eine wichtige Lektion gelernt: Ich werde nie wieder vom Weg abgehen und mit Fremden sprechen!", "Und wenn sie nicht gestorben sind dann leben sie noch heute."]}];

var cp=0,sp=false,an=false,sr=1.0,ci=0,dv=null;

function pl(){
dv=null;
if(!window.speechSynthesis)return;
setTimeout(function(){
var v=speechSynthesis.getVoices();
if(v.length>0)for(var i=0;i<v.length;i++){if(v[i].lang&&v[i].lang.startsWith("de")){dv=v[i];break}}
},100);
}

function ct(t){return t.replace(/[,.;:!?"\u201e\u201c\u00bb\u00ab\u2014\u2013()\/]/g," ").replace(/\s+/g," ").trim()}

function gv(t){
var l=t.toLowerCase();
if(l.indexOf("fresse")>=0||l.indexOf("damit")>=0||l.indexOf("wolf sagte")>=0||l.indexOf("der wolf ")>=0)return{r:.75,p:.5};
if(l.indexOf("rotk")>=0||l.indexOf("sagte")>=0||l.indexOf("warum")>=0)return{r:.95,p:1.25};
return{r:.85,p:1};
}

function init(){
var b=document.getElementById("book");
P.forEach(function(p,i){
var w=document.createElement("div");w.className="page-wrap"+(i===0?" active":"");
var g=document.createElement("div");g.className="page "+p.theme+(p.cover?" page-cover":"");
if(p.cover){
var n=document.createElement("div");n.className="cover-inner";
n.innerHTML='<span class="cover-emoji">'+p.emoji+'</span><div class="cover-title">'+p.title+'</div><div class="cover-sub">'+p.subtitle+'</div><div class="cover-by">\ud83c\udde9\ud83c\uddea f\u00fcr \u7267\u7ae5 - Lektion 1</div><div class="cover-tip">'+p.tip+'</div>';
g.appendChild(n);
}else{
var imgDiv=null;
if(p.img&&I[p.img]){
imgDiv=document.createElement("div");
imgDiv.className="page-img";
var im=document.createElement("img");
im.src=I[p.img];
im.alt="Szene";
im.draggable=false;
imgDiv.appendChild(im);
g.appendChild(imgDiv);
}
var body=document.createElement("div");
body.className="page-body";
var st=document.createElement("div");st.className="story-text";
p.text.forEach(function(q){
var ss=q.match(/[^.!?]+[.!?]*/g)||[q];var pp=document.createElement("p");
ss.forEach(function(s){var t=s.trim();if(t){var sp=document.createElement("span");sp.className="sent inactive";sp.textContent=t+" ";pp.appendChild(sp)}});
st.appendChild(pp);
});
body.appendChild(st);
if(p.end){
var ee=document.createElement("div");ee.className="end-emoji";ee.textContent="\ud83c\udfe1";
body.appendChild(ee);
}
g.appendChild(body);
var pn=document.createElement("div");pn.className="page-number";pn.textContent=i+" / "+(P.length-1);
g.appendChild(pn);
}
w.appendChild(g);b.appendChild(w);
});
document.getElementById("prvBtn").disabled=true;
setTimeout(function(){document.getElementById("loading").classList.add("hidden")},300);
try{speechSynthesis.cancel()}catch(e){}pl();
document.addEventListener("keydown",function(e){if(e.key==="ArrowLeft")pp();if(e.key==="ArrowRight"||e.key===" "||e.key==="Enter"){e.preventDefault();np()}});
}

function np(){
if(cp>=P.length-1||an)return;ts();an=true;
var ws=document.querySelectorAll(".page-wrap");
ws[cp].classList.remove("active");ws[cp].classList.add("exit-left");
ws[cp+1].classList.remove("enter-right");ws[cp+1].classList.add("active");
cp++;setTimeout(function(){ws[cp-1].classList.remove("exit-left");an=false},500);un();
}

function pp(){
if(cp<=0||an)return;ts();an=true;
var ws=document.querySelectorAll(".page-wrap");
ws[cp].classList.remove("active");ws[cp].classList.add("exit-right");
ws[cp-1].classList.remove("enter-left");ws[cp-1].classList.add("active");
cp--;setTimeout(function(){ws[cp+1].classList.remove("exit-right");an=false},500);un();
}

function un(){
document.getElementById("prvBtn").disabled=cp<=0;
document.getElementById("nxtBtn").disabled=cp>=P.length-1;
document.getElementById("prgTxt").textContent=cp===0?"Titel":cp+" / "+(P.length-1);
}

function ts(){
sp=false;if(window.speechSynthesis)speechSynthesis.cancel();
var btn=document.getElementById("speakBtn");btn.classList.remove("speaking");
document.getElementById("spkLbl").textContent="Vorlesen";
document.querySelectorAll(".page-wrap.active .sent").forEach(function(s){s.classList.remove("active");if(!s.classList.contains("done"))s.classList.add("inactive")});
}

function tg(){if(sp)ts();else ss()}

function ss(){
if(cp===0){fa();return}
var sents=document.querySelectorAll(".page-wrap.active .sent");
if(!sents.length)return;
try{speakSents(sents);}catch(e){}
}

function speakSents(sents){
sp=true;ci=0;
document.getElementById("speakBtn").classList.add("speaking");
document.getElementById("spkLbl").textContent="Stop";
sents.forEach(function(s){s.classList.add("inactive");s.classList.remove("active","done")});
/* iOS primer: create+speak silent utterance FIRST, synchronously in click handler */
try{speechSynthesis.cancel() || 1;var primer=new SpeechSynthesisUtterance("a");primer.lang="de-DE";speechSynthesis.speak(primer)}catch(e){}
/* Then queue ALL real utterances */
var total=sents.length;var done=0;
for(var i=0;i<total;i++){(function(idx,el){
var txt=ct(el.textContent.trim());
if(!txt){done++;return}
var u=new SpeechSynthesisUtterance(txt);u.lang="de-DE";
if(dv)u.voice=dv;var cv=gv(el.textContent);u.pitch=cv.p;u.rate=sr*cv.r;
u.onstart=function(){ci=idx;el.classList.remove("inactive");el.classList.add("active");try{el.scrollIntoView({block:"center",behavior:"smooth"})}catch(e){}};
u.onend=function(){el.classList.remove("active");el.classList.add("done");done++;if(done>=total){sp=false;document.getElementById("speakBtn").classList.remove("speaking");document.getElementById("spkLbl").textContent="Vorlesen";if(document.getElementById("autoF").checked)setTimeout(function(){np()},600)}};
speechSynthesis.speak(u)
})(i,sents[i])}
}function fa(){
var ws=document.querySelectorAll(".page-wrap");
ws[0].classList.remove("active");ws[0].classList.add("exit-left");
ws[1].classList.remove("enter-right");ws[1].classList.add("active");
cp=1;an=true;un();
setTimeout(function(){
ws[0].classList.remove("exit-left");an=false;
var sents=document.querySelectorAll(".page-wrap.active .sent");
if(sents.length)speakSents(sents);
},500);
